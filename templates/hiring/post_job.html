{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Post a New Job - House Worker Hiring Platform{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-md-8 col-lg-6 mx-auto">
            <div class="card shadow-sm border-0 p-5 rounded-4">
                <div class="text-center mb-5">
                    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                        style="width: 80px; height: 80px;">
                        <i class="fas fa-plus fa-2x"></i>
                    </div>
                    <h2 class="fw-bold">Post a New Job</h2>
                    <p class="text-muted">Describe the service you need and find the perfect helper.</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary rounded-pill py-3 fw-bold">
                            <i class="fas fa-bullhorn me-2"></i> Post Job Now
                        </button>
                        <a href="{% url 'hiring:employer_dashboard' %}" class="btn btn-link text-muted">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
